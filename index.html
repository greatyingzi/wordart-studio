<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordArt Studio - Create Beautiful Animated Text Effects</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
  <meta name="description" content="Create beautiful animated WordArt effects online. Customize text, colors, curves, animations, and export high-res images.">
</head>
<body>

  <!-- Header -->
  <header id="appHeader">
    <div class="logo">
      <svg viewBox="0 0 40 40" width="36" height="36">
        <defs>
          <linearGradient id="lg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff0080"/>
            <stop offset="100%" stop-color="#00ffff"/>
          </linearGradient>
        </defs>
        <rect rx="8" width="40" height="40" fill="url(#lg)"/>
        <text x="20" y="28" text-anchor="middle" font-size="20" font-weight="bold" fill="#fff">W</text>
      </svg>
      <span>WordArt Studio</span>
    </div>
    <div class="header-actions">
      <button id="btnUndo" title="Undo" class="icon-btn">&#8617;</button>
      <button id="btnRedo" title="Redo" class="icon-btn">&#8618;</button>
      <button id="btnReset" class="secondary-btn">Reset</button>
      <button id="btnExport" class="primary-btn">&#128230; Export</button>
      <button id="btnShare" class="secondary-btn">&#128279; Share</button>
    </div>
  </header>

  <div id="appBody">
    <!-- Left Panel: Controls -->
    <aside id="leftPanel">
      <!-- Tabs -->
      <div class="tabs" id="controlTabs">
        <button class="tab active" data-tab="text">Text</button>
        <button class="tab" data-tab="style">Style</button>
        <button class="tab" data-tab="curve">Curve</button>
        <button class="tab" data-tab="animation">Animate</button>
        <button class="tab" data-tab="fx">Effects</button>
      </div>

      <!-- Text Tab -->
      <div class="panel-body panel-active" id="panelText">
        <div class="field">
          <label>Text Content</label>
          <textarea id="ctrlText" rows="2">Hello World!</textarea>
        </div>
        <div class="field">
          <label>Font Family</label>
          <select id="ctrlFont">
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="Impact">Impact</option>
            <option value="Courier New">Courier New</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
            <option value="Verdana">Verdana</option>
            <option value="Times New Roman">Times New Roman</option>
            <option value="Palatino Linotype">Palatino Linotype</option>
          </select>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Font Size <span id="valSize">56</span></label>
            <input type="range" id="ctrlSize" min="16" max="120" value="56">
          </div>
          <div class="field">
            <label>Letter Spacing <span id="valLSpace">4</span></label>
            <input type="range" id="ctrlLSpace" min="-10" max="30" value="4">
          </div>
        </div>
        <div class="field">
          <label>Font Weight</label>
          <div class="chip-group" id="weightGroup">
            <span class="chip selected" data-val="normal">Normal</span>
            <span class="chip" data-val="bold">Bold</span>
            <span class="chip" data-val="900">Heavy</span>
          </div>
        </div>
      </div>

      <!-- Style Tab -->
      <div class="panel-body" id="panelStyle">
        <div class="field">
          <label>Preset Styles</label>
          <div class="preset-grid" id="presetGrid"></div>
        </div>
        <hr>
        <div class="field">
          <label>Fill Colors</label>
          <div class="color-row">
            <input type="color" id="ctrlCol1" value="#ff0044">
            <span>&#8594;</span>
            <input type="color" id="ctrlCol2" value="#ffdd00">
            <input type="color" id="ctrlCol3" value="#00ffff" disabled title="Coming soon">
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Outline Color</label>
            <input type="color" id="ctrlOutline" value="#000000">
          </div>
          <div class="field">
            <label>Outline Width <span id="valOWidth">2</span></label>
            <input type="range" id="ctrlOWidth" min="0" max="10" value="2" step="0.5">
          </div>
        </div>
        <div class="field">
          <label>Extrusion Depth <span id="valDepth">10</span></label>
          <input type="range" id="ctrlDepth" min="0" max="25" value="10">
        </div>
        <div class="field">
          <label>Gradient Direction</label>
          <div class="chip-group" id="gradDirGroup">
            <span class="chip selected" data-dir="diag">&#90&#45;</span>
            <span class="chip" data-dir="h">&#8594;</span>
            <span class="chip" data-dir="v">&#8595;</span>
            <span class="chip" data-dir="radial">&#9679;</span>
          </div>
        </div>
      </div>

      <!-- Curve Tab -->
      <div class="panel-body" id="panelCurve">
        <div class="field">
          <label>Shape</label>
          <div class="shape-grid" id="shapeGrid"></div>
        </div>
        <div class="field">
          <label>Curvature <span id="valCurv">0.5</span></label>
          <input type="range" id="ctrlCurv" min="0" max="1" value="0.5" step="0.05">
        </div>
        <div class="field">
          <label>Amplitude <span id="valAmp">40</span></label>
          <input type="range" id="ctrlAmp" min="0" max="120" value="40">
        </div>
        <div class="field">
          <label>Rotation Offset <span id="valRotOff">0</span>&deg;</label>
          <input type="range" id="ctrlRotOff" min="-180" max="180" value="0">
        </div>
        <div class="field">
          <label>Coil Radius <span id="valRad">120</span></label>
          <input type="range" id="ctrlRad" min="40" max="250" value="120">
        </div>
        <div class="field">
          <label>Coil Sweep <span id="valSweep">180</span>&deg;</label>
          <input type="range" id="ctrlSweep" min="30" max="540" value="180">
        </div>
      </div>

      <!-- Animation Tab -->
      <div class="panel-body" id="panelAnim">
        <div class="field">
          <label>Animation Preset</label>
          <div class="anim-grid" id="animGrid"></div>
        </div>
        <hr>
        <div class="field">
          <label>Speed <span id="valSpeed">1.0</span>x</label>
          <input type="range" id="ctrlSpeed" min="0" max="3" value="1" step="0.1">
        </div>
        <div class="field">
          <label>Wave Frequency <span id="valFreq">3</span></label>
          <input type="range" id="ctrlFreq" min="1" max="8" value="3" step="0.5">
        </div>
        <div class="field">
          <label>Bounce Height <span id="valBounce">12</span></label>
          <input type="range" id="ctrlBounce" min="0" max="40" value="12">
        </div>
        <div class="field">
          <label>Flicker Intensity <span id="valFlick">0.15</span></label>
          <input type="range" id="ctrlFlick" min="0" max="0.5" value="0.15" step="0.01">
        </div>
      </div>

      <!-- FX Tab -->
      <div class="panel-body" id="panelFx">
        <div class="field checkbox-field">
          <label><input type="checkbox" id="ctrlGlow" checked> Glow Effect</label>
        </div>
        <div class="field">
          <label>Glow Blur <span id="valGBlur">15</span></label>
          <input type="range" id="ctrlGBlur" min="0" max="60" value="15">
        </div>
        <div class="field">
          <label>Glow Opacity <span id="valGAlpha">0.25</span></label>
          <input type="range" id="ctrlGAlpha" min="0" max="0.8" value="0.25" step="0.01">
        </div>
        <hr>
        <div class="field checkbox-field">
          <label><input type="checkbox" id="ctrlParticles"> Particles</label>
        </div>
        <div class="field">
          <label>Particle Type</label>
          <select id="ctrlPType">
            <option value="stars">Stars</option>
            <option value="embers">Embers</option>
            <option value="snow">Snow</option>
            <option value="dots">Dots</option>
          </select>
        </div>
        <div class="field">
          <label>Particle Count <span id="valPCnt">40</span></label>
          <input type="range" id="ctrlPCnt" min="0" max="100" value="40">
        </div>
        <hr>
        <div class="field checkbox-field">
          <label><input type="checkbox" id="ctrlBgGrid"> Background Grid</label>
        </div>
        <div class="field checkbox-field">
          <label><input type="checkbox" id="ctrlScanlines"> Scanlines Overlay</label>
        </div>
      </div>
    </aside>

    <!-- Center: Canvas Stage -->
    <section id="stage">
      <canvas id="mainCanvas"></canvas>
      <div class="canvas-overlay-info" id="overlayInfo">
        <span id="infoFPS">60 FPS</span>
        <span id="infoChars">12 chars</span>
      </div>
    </section>

    <!-- Right Panel: History & Gallery -->
    <aside id="rightPanel">
      <div class="right-section">
        <h3>History</h3>
        <div id="historyLog" class="history-log"></div>
      </div>
      <div class="right-section">
        <h3>Saved Snapshots</h3>
        <div id="snapshotList" class="snapshot-list"></div>
      </div>
    </aside>
  </div>

  <!-- Export Modal -->
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="exportModal">
      <div class="modal-header">
        <h2>Export Image</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Format</label>
          <div class="chip-group" id="formatGroup">
            <span class="chip selected" data-format="png">PNG</span>
            <span class="chip" data-format="jpg">JPG</span>
            <span class="chip" data-format="webp">WEBP</span>
          </div>
        </div>
        <div class="field">
          <label>Scale</label>
          <div class="chip-group" id="scaleGroup">
            <span class="chip" data-scale="1">1x</span>
            <span class="chip selected" data-scale="2">2x</span>
            <span class="chip" data-scale="4">4x</span>
          </div>
        </div>
        <div class="field">
          <label>Background</label>
          <div class="chip-group" id="bgModeGroup">
            <span class="chip selected" data-bg="auto">Auto</span>
            <span class="chip" data-bg="dark">Dark</span>
            <span class="chip" data-bg="light">Light</span>
            <span class="chip" data-bg="transparent">Transparent</span>
          </div>
        </div>
        <button id="btnDownload" class="primary-btn full-width">&#128229; Download</button>
      </div>
    </div>
  </div>

  <!-- Share Modal -->
  <div class="modal-backdrop" id="shareModal">
    <div class="modal" id="shareModalInner">
      <div class="modal-header">
        <h2>Share Configuration</h2>
        <button class="modal-close">&times;</button>
      </div>
      <div class="modal-body">
        <p>Copied to clipboard!</p>
        <textarea id="shareUrl" readonly></textarea>
        <button id="btnCopyLink" class="primary-btn full-width">Copy Link</button>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
